name: Open Sky
description: Cerulean + Coral — liberation and breathing room
author: agency

dark:
  # Surfaces
  bg: "#081a2a"
  bg_surface: "#091e30"
  bg_card: "#0a2138"
  bg_card_hover: "#0e2a45"
  border: "#0f3352"
  border_subtle: "#0c2844"

  # Sidebar
  sidebar_bg: "#0a2138"
  sidebar_text: "#5a94b8"
  sidebar_active_bg: "rgba(56,189,248,0.12)"
  sidebar_active_text: "#38bdf8"
  sidebar_section: "#2a6a8f"

  # Typography
  text: "#7eb8dc"
  text_heading: "#b8ddf0"
  text_muted: "#5a94b8"
  text_faint: "#2a6a8f"

  # Primary action
  primary: "#0ea5e9"
  primary_text: "#06131f"
  primary_hover: "#0284c7"

  # Secondary action
  secondary: "#0f3352"
  secondary_text: "#7eb8dc"
  secondary_hover: "#154566"

  # Outline action
  outline: "#38bdf8"

  # Code
  code_bg: "#04111c"

  # Prose
  link: "#38bdf8"

light:
  # Surfaces
  bg: "#f0f9ff"
  bg_surface: "#f0f9ff"
  bg_card: "#ffffff"
  bg_card_hover: "#f7fcff"
  border: "#bae6fd"
  border_subtle: "#e0f2fe"

  # Sidebar — stays dark
  sidebar_bg: "#0a2138"
  sidebar_text: "#5a94b8"
  sidebar_active_bg: "rgba(56,189,248,0.12)"
  sidebar_active_text: "#38bdf8"
  sidebar_section: "#2a6a8f"

  # Sidebar topbar in light mode
  sidebar_topbar: "#0c2d48"

  # Typography
  text: "#0c2d48"
  text_heading: "#06131f"
  text_muted: "#1a5a82"
  text_faint: "#6ba3c9"

  # Primary action
  primary: "#0ea5e9"
  primary_text: "#ffffff"
  primary_hover: "#0284c7"

  # Secondary action
  secondary: "#e0f2fe"
  secondary_text: "#0c4a6e"
  secondary_hover: "#bae6fd"

  # Outline action
  outline: "#0284c7"

  # Code
  code_bg: "#e0f2fe"

  # Prose
  link: "#0284c7"

# Logo — node constellation
logo:
  dark:
    bg: "#155e8a"
    node: "#ffffff"
    line: "#ffffff"
  light:
    bg: "#f0f9ff"
    bg_border: "#bae6fd"
    node: "#0ea5e9"
    line: "#0ea5e9"

# Semantic colors
status:
  healthy: { bg_dark: "rgba(34,197,94,0.15)", text_dark: "#4ade80", bg_light: "#dcfce7", text_light: "#166534" }
  pending: { bg_dark: "rgba(249,115,22,0.2)", text_dark: "#fb923c", bg_light: "#ffedd5", text_light: "#9a3412" }
  error: { bg_dark: "rgba(239,68,68,0.15)", text_dark: "#f87171", bg_light: "#fee2e2", text_light: "#991b1b" }

# Tailwind color scale
scale:
  50: "#f0f9ff"
  100: "#e0f2fe"
  200: "#bae6fd"
  500: "#0ea5e9"
  600: "#0284c7"
  700: "#0369a1"
  800: "#0a2138"
  900: "#081a2a"
  950: "#04111c"
