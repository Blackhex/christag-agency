<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ agency_title|default('Agency') }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .prose h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1e293b; }
    .prose h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #334155; }
    .prose h4 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.25rem; color: #475569; }
    .prose p { margin-bottom: 0.75rem; line-height: 1.65; }
    .prose ul, .prose ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
    .prose li { margin-bottom: 0.25rem; line-height: 1.55; }
    .prose ul { list-style-type: disc; }
    .prose ol { list-style-type: decimal; }
    .prose strong { font-weight: 600; }
    .prose code { background: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 0.875rem; word-break: break-word; }
    .prose pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.875rem; }
    .prose th, .prose td { padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; text-align: left; }
    .prose th { background: #f8fafc; font-weight: 600; }
    .prose blockquote { border-left: 3px solid #94a3b8; padding-left: 1rem; color: #64748b; margin-bottom: 0.75rem; }
    .prose a { color: #2563eb; text-decoration: underline; }
    nav a.active { background-color: #e0e7ff; color: #3730a3; }
    @media (max-width: 768px) {
      .prose table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body class="h-full bg-gray-50">
  <!-- Mobile top bar -->
  <div class="md:hidden fixed top-0 left-0 right-0 z-30 bg-white border-b border-gray-200 flex items-center h-12 px-3">
    <button onclick="document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('overlay').classList.remove('hidden')" class="p-1.5 rounded-lg hover:bg-gray-100">
      <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="ml-2 text-sm font-bold text-gray-900">{{ agency_title|default('Agency') }}</span>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div id="overlay" class="hidden fixed inset-0 z-40 bg-black/30" onclick="document.getElementById('sidebar').classList.add('-translate-x-full'); this.classList.add('hidden')"></div>

  <div class="flex h-full">
    <!-- Sidebar -->
    <nav id="sidebar" class="fixed md:static z-50 h-full w-56 bg-white border-r border-gray-200 flex flex-col py-4 px-3 shrink-0 transition-transform duration-200 -translate-x-full md:translate-x-0">
      <div class="flex items-center justify-between px-3 mb-4">
        <a href="{% if group %}/{{ group }}/{% else %}/{% endif %}" class="text-lg font-bold text-gray-900 flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
          {{ agency_title|default('Agency') }}
        </a>
        <button class="md:hidden p-1 rounded hover:bg-gray-100" onclick="document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('overlay').classList.add('hidden')">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Group switcher -->
      <div class="px-3 mb-4">
        <select onchange="window.location='/'+this.value+'/'" class="w-full px-2 py-1.5 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-700 font-medium">
          {% for gkey, gname in groups.items() %}
          <option value="{{ gkey }}" {% if gkey == group %}selected{% endif %}>{{ gname }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="space-y-0.5" onclick="if(window.innerWidth<768){document.getElementById('sidebar').classList.add('-translate-x-full');document.getElementById('overlay').classList.add('hidden')}">
        {% if not admin_active %}
        <a href="/{{ group }}/" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'home' %}active{% endif %}">
          Inbox
        </a>
        <a href="/{{ group }}/clues" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'clues' %}active{% endif %}">
          Clues
        </a>
        <a href="/{{ group }}/curiosities" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'curiosities' %}active{% endif %}">
          Curiosities
        </a>
        <a href="/{{ group }}/decisions" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'decisions' %}active{% endif %}">
          Decisions
        </a>

        <div class="pt-3 pb-1 px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Resources</div>

        <a href="/{{ group }}/documents" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'documents' %}active{% endif %}">
          Documents
        </a>
        <a href="/{{ group }}/logs" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'logs' %}active{% endif %}">
          Logs
        </a>

        <div class="pt-3 pb-1 px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Config</div>

        <a href="/{{ group }}/prompts" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'prompts' %}active{% endif %}">
          Prompts
        </a>
        <a href="/{{ group }}/memory" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'memory' %}active{% endif %}">
          Memory
        </a>
        {% endif %}

        <div class="pt-3 pb-1 px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Admin</div>
        <a href="/admin/" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 {% if active == 'admin' %}active{% endif %}">
          Settings
        </a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto pt-12 md:pt-0">
      <div class="max-w-5xl mx-auto px-4 md:px-6 py-4 md:py-6">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
