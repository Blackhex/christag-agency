<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup — {{ agency_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            agency: {
              50: '#f0f4ff', 100: '#dbe4ff', 200: '#bac8ff',
              500: '#5c7cfa', 600: '#4263eb', 700: '#3b5bdb',
              800: '#364fc7', 900: '#1e2a5e', 950: '#141b3d',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-agency-950 font-sans flex items-center justify-center p-4">
  <div class="w-full max-w-lg">
    <!-- Logo -->
    <div class="flex items-end justify-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-agency-600 flex items-center justify-center">
        <svg class="w-6 h-6" viewBox="0 0 80 80" fill="none">
          <line x1="20" y1="60" x2="29" y2="42" stroke="white" stroke-width="3" opacity="0.4"/>
          <line x1="29" y1="42" x2="40" y2="18" stroke="white" stroke-width="3" opacity="0.4"/>
          <line x1="60" y1="60" x2="51" y2="42" stroke="white" stroke-width="3" opacity="0.4"/>
          <line x1="51" y1="42" x2="40" y2="18" stroke="white" stroke-width="3" opacity="0.4"/>
          <line x1="29" y1="42" x2="51" y2="42" stroke="white" stroke-width="3" opacity="0.4"/>
          <circle cx="40" cy="18" r="7" fill="white"/>
          <circle cx="29" cy="42" r="5.5" fill="white" opacity="0.8"/>
          <circle cx="51" cy="42" r="5.5" fill="white" opacity="0.8"/>
          <circle cx="20" cy="60" r="5.5" fill="white" opacity="0.6"/>
          <circle cx="60" cy="60" r="5.5" fill="white" opacity="0.6"/>
        </svg>
      </div>
      <span class="text-2xl font-bold text-white tracking-tight">{{ agency_title }}</span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h1 class="text-xl font-bold text-gray-900 mb-2">Welcome</h1>
      <p class="text-sm text-gray-500 mb-6">Point Agency at a directory of agents to get started.</p>

      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error | safe }}</div>
      {% endif %}

      <form method="POST" action="/setup">
        <div class="mb-4">
          <label for="path" class="block text-sm font-medium text-gray-700 mb-1.5">Agent Directory Path</label>
          <input type="text" name="path" id="path" value="{{ path_value }}"
                 placeholder="/path/to/your/agents"
                 class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-agency-500 focus:border-agency-500">
        </div>

        <div class="mb-6">
          <span class="text-xs text-gray-400">Suggestion:</span>
          <button type="button" onclick="document.getElementById('path').value='{{ suggestion }}'"
                  class="ml-1 text-xs font-mono text-agency-600 hover:text-agency-800 bg-agency-50 px-2 py-0.5 rounded hover:bg-agency-100 transition-colors">
            {{ suggestion }}
          </button>
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-agency-600 text-white text-sm font-semibold rounded-lg hover:bg-agency-700 transition-colors">
          Set Up
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-500 mt-4">
      <a href="/admin/" class="text-gray-400 hover:text-gray-300">Skip to manual setup</a>
    </p>

    <div class="mt-6 bg-agency-900/50 border border-agency-800 rounded-xl p-4 text-center">
      <p class="text-xs text-gray-400">
        <span class="text-agency-200 font-medium">Don't have agents yet?</span>
        Run <code class="font-mono bg-agency-800 text-agency-200 px-1.5 py-0.5 rounded text-[11px]">/agency-setup</code>
        from any project to auto-generate a full agent team with roles, dispatch, and workspaces.
      </p>
    </div>
  </div>
</body>
</html>
