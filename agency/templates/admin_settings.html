{% extends "base.html" %}
{% block title %}App Settings — {{ agency_title }}{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">App Settings</h1>

  <form method="post" action="/admin/settings" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label for="title" class="block text-sm font-medium text-gray-700 mb-1">App Title</label>
      <input type="text" name="title" id="title" value="{{ agency_title }}"
             class="w-full max-w-sm px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
      <p class="mt-1 text-xs text-gray-400">Shown in the sidebar and page titles.</p>
    </div>
    <div>
      <label for="default_group" class="block text-sm font-medium text-gray-700 mb-1">Default Group</label>
      <select name="default_group" id="default_group"
              class="w-full max-w-sm px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        {% for gkey, gname in groups.items() %}
        <option value="{{ gkey }}" {% if gkey == default_group %}selected{% endif %}>{{ gname }}</option>
        {% endfor %}
      </select>
      <p class="mt-1 text-xs text-gray-400">The group shown when you visit the root URL.</p>
    </div>
    <div>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
        Save Settings
      </button>
    </div>
  </form>
</div>
{% endblock %}
