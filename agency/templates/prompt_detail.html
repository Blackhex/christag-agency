{% extends "base.html" %}
{% set active = "prompts" %}

{% block title %}{{ slug }} - Prompts{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="/{{ group }}/prompts" class="text-sm text-indigo-600 hover:text-indigo-800">&larr; Back to prompts</a>
</div>

<div class="bg-white rounded-lg border border-gray-200 p-6">
  <div class="flex items-center justify-between mb-4 pb-4 border-b border-gray-100">
    <h1 class="text-lg font-bold text-gray-900">{{ slug }}.md</h1>
    <button onclick="document.getElementById('editor').classList.toggle('hidden'); document.getElementById('rendered').classList.toggle('hidden')" class="px-3 py-1 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">
      Toggle Editor
    </button>
  </div>

  <div id="rendered" class="prose max-w-none">
    {{ content_html | safe }}
  </div>

  <div id="editor" class="hidden">
    <form method="POST" action="/{{ group }}/prompts/{{ slug }}/save">
      <textarea name="content" rows="30" class="w-full font-mono text-sm border border-gray-300 rounded-lg p-4 bg-gray-50">{{ raw }}</textarea>
      <div class="mt-3 flex justify-end">
        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
